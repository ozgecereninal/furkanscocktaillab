<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Furkan’s Cocktail Lab 🧑‍💻</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --cyber-blue: #38bdf8;
            --soft-green: #22c55e;
            --dark-bg: #030712;
        }
        body {
            background-color: var(--dark-bg);
            color: #e2e8f0;
            font-family: 'Inter', sans-serif;
            background-image: radial-gradient(circle at 50% 0%, #1e293b 0%, transparent 70%);
            background-attachment: fixed;
        }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .glass-card {
            background: rgba(15, 23, 42, 0.7);
            border: 1px solid rgba(56, 189, 248, 0.1);
            backdrop-filter: blur(12px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .glass-card:hover { border-color: var(--cyber-blue); box-shadow: 0 0 20px rgba(56, 189, 248, 0.1); }
        .input-field {
            background: rgba(2, 6, 23, 0.9);
            border: 1px solid #1e293b;
            color: #f8fafc;
        }
        .input-field:focus { border-color: var(--cyber-blue); outline: none; }
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        .custom-scroll::-webkit-scrollbar-thumb:hover { background: var(--cyber-blue); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="min-h-screen custom-scroll flex flex-col p-4 md:p-8">

    <header class="max-w-6xl w-full mx-auto mb-10 flex flex-col md:flex-row justify-between items-start md:items-end gap-6">
        <div>
            <h1 class="text-4xl font-bold text-white mb-2">Furkan’s <span class="text-[#38bdf8]">Cocktail Lab</span> 🧑‍💻</h1>
            <div class="flex items-center gap-3 mono text-sm text-[#22c55e]">
                <span class="inline-block w-2 h-2 rounded-full bg-green-500 animate-ping"></span>
                Access Granted. System Ready.
            </div>
        </div>
        <button onclick="openModal('add')" class="bg-[#38bdf8] text-black px-6 py-3 rounded-lg font-bold mono text-sm hover:scale-105 transition shadow-lg shadow-sky-500/20">
            + YENİ KOKTEYL EKLE
        </button>
    </header>

    <div class="max-w-6xl w-full mx-auto mb-8 flex gap-3 overflow-x-auto pb-2 no-scrollbar" id="filterContainer">
        <button onclick="renderCards('all')" class="px-4 py-1.5 rounded-md text-xs mono border border-slate-700 bg-slate-800/50 hover:border-sky-400 whitespace-nowrap">ALL_UNITS</button>
        <button onclick="renderCards('Date Night')" class="px-4 py-1.5 rounded-md text-xs mono border border-slate-700 bg-slate-800/50 hover:border-sky-400 whitespace-nowrap">DATE_NIGHT</button>
        <button onclick="renderCards('Arkadaşlarla')" class="px-4 py-1.5 rounded-md text-xs mono border border-slate-700 bg-slate-800/50 hover:border-sky-400 whitespace-nowrap">FRIENDS_ENV</button>
        <button onclick="renderCards('Deneysel')" class="px-4 py-1.5 rounded-md text-xs mono border border-slate-700 bg-slate-800/50 hover:border-sky-400 whitespace-nowrap">EXPERIMENTAL_LAB</button>
        <button onclick="renderCards('Gece Seansları')" class="px-4 py-1.5 rounded-md text-xs mono border border-slate-700 bg-slate-800/50 hover:border-sky-400 whitespace-nowrap">NIGHT_SHIFT</button>
    </div>

    <main class="max-w-6xl w-full mx-auto flex-grow">
        <div id="cocktailGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        <div class="mt-16 text-center opacity-20 mono text-[10px] uppercase tracking-[0.4em]">
            // New entries are always welcome.
        </div>
    </main>

    <footer class="max-w-6xl w-full mx-auto mt-20 pt-8 border-t border-slate-800/50 flex flex-col items-center gap-2 mb-4">
        <p class="mono text-xs text-slate-400">“Built with love & a little bit of chaos 💻❤️”</p>
        <p class="mono text-[10px] text-slate-600 tracking-widest uppercase">v1.0 – Özge Edition | System Ready</p>
    </footer>

    <div id="modalOverlay" class="fixed inset-0 bg-black/90 backdrop-blur-md hidden z-50 flex items-center justify-center p-4">
        <div class="glass-card w-full max-w-xl rounded-2xl p-6 md:p-8 border-[#38bdf8]/30 max-h-[90vh] overflow-y-auto custom-scroll shadow-2xl">
            <h2 id="modalTitle" class="text-2xl font-bold mono text-sky-400 mb-6 uppercase tracking-tighter italic">> Edit_Module</h2>
            <input type="hidden" id="editId">
            
            <div class="space-y-4">
                <input type="text" id="cName" placeholder="Kokteyl Adı" class="w-full px-4 py-3 rounded-lg input-field">
                <select id="cAlbum" class="w-full px-4 py-3 rounded-lg input-field">
                    <option value="Deneysel">Albüm: Deneysel</option>
                    <option value="Date Night">Albüm: Date Night</option>
                    <option value="Arkadaşlarla">Albüm: Arkadaşlarla</option>
                    <option value="Gece Seansları">Albüm: Gece Seansları</option>
                </select>
                
                <div class="border-2 border-dashed border-slate-700 rounded-xl p-6 text-center hover:border-sky-400 transition cursor-pointer group" onclick="document.getElementById('cFile').click()">
                    <div id="uploadPrompt" class="space-y-2">
                        <svg class="w-8 h-8 mx-auto text-slate-500 group-hover:text-sky-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                        <p class="text-[10px] mono text-slate-500 uppercase tracking-widest">Resmi Değiştirmek İçin Tıkla</p>
                    </div>
                    <input type="file" id="cFile" class="hidden" accept="image/*" onchange="handleFile(this)">
                    <img id="imgPreview" class="mt-2 h-40 mx-auto rounded-lg hidden border border-sky-400/50 shadow-lg">
                </div>

                <textarea id="cIngredients" placeholder="Malzemeler" class="w-full px-4 py-3 rounded-lg input-field h-24"></textarea>
                <textarea id="cRecipe" placeholder="Hazırlanış Adımları..." class="w-full px-4 py-3 rounded-lg input-field h-32"></textarea>
                
                <div class="flex gap-4 pt-4">
                    <button onclick="closeModal()" class="flex-1 py-3 border border-slate-700 rounded-lg mono text-xs hover:bg-white/5 transition">İPTAL_ET</button>
                    <button onclick="processSave()" class="flex-1 py-3 bg-[#22c55e] text-black font-bold rounded-lg mono text-xs hover:bg-green-400 transition">SİSTEME_KAYDET</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const initialData = [
            { id: 1, name: "Debug Mojito", album: "Date Night", ingredients: "50 ml Beyaz Rom, 25 ml Lime Suyu, 10 ml Şeker Şurubu, Nane Yaprakları, Soda", recipe: "Nane ve şeker şurubunu muddle ile ezin. Lime suyu ve rom ekleyin. Buz ekleyin ve karıştırın. Üzerini soda ile tamamlayın.", image: "https://i.ibb.co/5X9bhpLX/mojito.jpg" },
            { id: 2, name: "404 Not Found Martini", album: "Arkadaşlarla", ingredients: "50 ml Cin, 20 ml Vermut, Zeytin", recipe: "Tüm malzemeleri shakerda karıştırın. Soğuk martini bardağına süzün. Zeytin ile servis edin.", image: "https://i.ibb.co/HTLycPVY/martini.jpg" },
            { id: 3, name: "Binary Margarita", album: "Deneysel", ingredients: "50 ml Tekila, 25 ml Lime Suyu, 15 ml Triple Sec", recipe: "Shakerda tüm malzemeleri buz ile çalkalayın. Tuzlu kenarlı bardakta servis edin.", image: "https://i.ibb.co/pj91H3q6/margarita.jpg" },
            { id: 4, name: "Root Access Sour", album: "Date Night", ingredients: "50 ml Bourbon, 25 ml Limon Suyu, 15 ml Şeker Şurubu, 1 Yumurta Akı (opsiyonel)", recipe: "Tüm malzemeleri shakerda buz ile çalkalayın. Soğuk bardağa süzün. Limon dilimi ile servis edin.", image: "https://i.ibb.co/fzTBF4Bb/sour.jpg" },
            { id: 5, name: "Stack Overflow Spritz", album: "Arkadaşlarla", ingredients: "50 ml Aperol, 75 ml Prosecco, Soda, Portakal Dilimi", recipe: "Bardağa Aperol ve Prosecco ekleyin. Biraz soda ekleyin. Portakal dilimi ile süsleyin.", image: "https://i.ibb.co/JWPhy1GQ/spritz.jpg" },
            { id: 6, name: "NightShift Debugger", album: "Gece Seansları", ingredients: "40 ml Vodka, 30 ml Kahve Likörü, 30 ml Taze Espresso", recipe: "Tüm malzemeleri shakerda buz ile çalkalayın. Soğuk martini bardağına süzün. Espresso çekirdeği ile süsleyin.", image: "https://i.ibb.co/4n1xsn67/espresso.jpg" },
            { id: 7, name: "FullStack Tea", album: "Arkadaşlarla", ingredients: "15 ml Vodka, 15 ml Gin, 15 ml Tekila, 15 ml Rum, 15 ml Triple Sec, 25 ml Limon Suyu, 30 ml Şeker Şurubu, Cola", recipe: "Tüm alkolleri shakerda buz ile karıştırın. Limon suyu ve şeker şurubunu ekleyin. Bardakta buz üzerine süzün ve üstüne cola ekleyin.", image: "https://i.ibb.co/d4cWgHKJ/tea.jpg" },
            { id: 8, name: "Segfault Cosmo", album: "Date Night", ingredients: "40 ml Vodka, 15 ml Triple Sec, 15 ml Cranberry Suyu, 10 ml Lime Suyu", recipe: "Shakerda tüm malzemeleri buz ile çalkalayın. Soğuk martini bardağına süzün. Lime dilimi ile süsleyin.", image: "https://i.ibb.co/CKdpgkJN/cosmo.jpg" }
        ];

        let cocktails = JSON.parse(localStorage.getItem('furkan_lab_v1')) || initialData;
        let currentImgBase64 = "";

        function renderCards(filter = 'all') {
            const grid = document.getElementById('cocktailGrid');
            grid.innerHTML = '';
            const filtered = filter === 'all' ? cocktails : cocktails.filter(c => c.album === filter);

            filtered.forEach(c => {
                const card = document.createElement('div');
                card.className = 'glass-card rounded-2xl overflow-hidden group flex flex-col';
                card.innerHTML = `
                    <div class="h-48 relative overflow-hidden">
                        <img src="${c.image}" class="w-full h-full object-cover opacity-60 group-hover:opacity-100 transition-all duration-700 group-hover:scale-110">
                        <div class="absolute inset-0 bg-gradient-to-t from-black/80 to-transparent"></div>
                        <button onclick="openModal('edit', ${c.id})" class="absolute top-4 right-4 bg-black/50 p-2.5 rounded-xl border border-white/10 hover:bg-sky-500 hover:text-black transition-all">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
                        </button>
                        <div class="absolute bottom-4 left-4">
                             <span class="px-2 py-0.5 rounded text-[9px] mono bg-sky-500/20 text-sky-400 border border-sky-400/30 uppercase">${c.album}</span>
                        </div>
                    </div>
                    <div class="p-6 flex-grow">
                        <h3 class="text-xl font-bold text-white mono mb-4 tracking-tight">${c.name}</h3>
                        <div class="hidden space-y-4 animate-in fade-in duration-500" id="info-${c.id}">
                            <div>
                                <p class="text-[10px] text-green-400 mono mb-1 uppercase tracking-widest font-bold">// Ingredients</p>
                                <p class="text-sm text-slate-300">${c.ingredients}</p>
                            </div>
                            <div>
                                <p class="text-[10px] text-sky-400 mono mb-1 uppercase tracking-widest font-bold">// Instructions</p>
                                <p class="text-sm text-slate-400 italic leading-relaxed">${c.recipe}</p>
                            </div>
                        </div>
                        <button onclick="toggleDetails(${c.id}, this)" 
                                class="mt-6 text-[10px] mono text-slate-500 hover:text-sky-400 transition-colors uppercase tracking-[0.2em]">VIEW_SOURCE</button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function toggleDetails(id, btn) {
            const el = document.getElementById(`info-${id}`);
            el.classList.toggle('hidden');
            btn.innerText = el.classList.contains('hidden') ? 'VIEW_SOURCE' : 'CLOSE_SOURCE';
        }

        function handleFile(input) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onloadend = () => {
                    currentImgBase64 = reader.result;
                    const preview = document.getElementById('imgPreview');
                    preview.src = reader.result;
                    preview.classList.remove('hidden');
                    document.getElementById('uploadPrompt').classList.add('hidden');
                };
                reader.readAsDataURL(file);
            }
        }

        function openModal(mode, id = null) {
            const modal = document.getElementById('modalOverlay');
            modal.classList.remove('hidden');
            if (mode === 'edit') {
                const c = cocktails.find(x => x.id === id);
                document.getElementById('modalTitle').innerText = "> Edit_Recipe_Data";
                document.getElementById('editId').value = c.id;
                document.getElementById('cName').value = c.name;
                document.getElementById('cAlbum').value = c.album;
                document.getElementById('cIngredients').value = c.ingredients;
                document.getElementById('cRecipe').value = c.recipe;
                document.getElementById('imgPreview').src = c.image;
                document.getElementById('imgPreview').classList.remove('hidden');
                document.getElementById('uploadPrompt').classList.add('hidden');
                currentImgBase64 = c.image;
            } else {
                document.getElementById('modalTitle').innerText = "> New_Recipe_Init";
                document.getElementById('editId').value = "";
                document.getElementById('cName').value = "";
                document.getElementById('cIngredients').value = "";
                document.getElementById('cRecipe').value = "";
                document.getElementById('imgPreview').classList.add('hidden');
                document.getElementById('uploadPrompt').classList.remove('hidden');
                currentImgBase64 = "https://images.unsplash.com/photo-1514362545857-3bc16c4c7d1b?auto=format&fit=crop&w=600";
            }
        }

        function processSave() {
            const id = document.getElementById('editId').value;
            const data = {
                id: id ? parseInt(id) : Date.now(),
                name: document.getElementById('cName').value,
                album: document.getElementById('cAlbum').value,
                ingredients: document.getElementById('cIngredients').value,
                recipe: document.getElementById('cRecipe').value,
                image: currentImgBase64
            };

            if (id) {
                const index = cocktails.findIndex(x => x.id === parseInt(id));
                cocktails[index] = data;
            } else {
                cocktails.unshift(data);
            }

            localStorage.setItem('furkan_lab_v1', JSON.stringify(cocktails));
            renderCards();
            closeModal();
        }

        function closeModal() { document.getElementById('modalOverlay').classList.add('hidden'); }
        window.addEventListener('keydown', (e) => { if(e.key === 'Escape') closeModal(); });

        renderCards();
    </script>
</body>
</html>
